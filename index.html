<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h3 id="playing-from">PLAYING FROM PLAYLIST</h3>
        <p id="playlist-name">Name of Playlist</p>
        <img id="album-art" src="/image/album_00.png" alt="">

        <div id="music-info">
            <div id="song-info">
                <div id="song-name">Name of Song</div>
                <div id="artist-name">Name of Artist</div>
            </div>
            <div id="like" class="button"><i class="bi bi-suit-heart"></i></div>
        </div>

        <div id="progress-bar">
            <div id="current-progress"></div>
        </div>

        <div id="controls">
            <div id="shuffle" class="button"><i class="bi bi-shuffle"></i></div>
            <div id="previous" class="button button-navigation"><i class="bi bi-caret-left-fill"></i></i></div>
            <div id="play-pause" class="button"><i class="bi bi-pause-circle-fill"></i></div>
            <div id="next" class="button button-navigation"><i class="bi bi-caret-right-fill"></i></i></div>
            <div id="repeat" class="button"><i class="bi bi-repeat"></i></i></div>
        </div>
    </div>
</body>

</html>
