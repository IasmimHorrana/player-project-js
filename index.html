<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player-JS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h3 id="playing-from">PLAYING FROM PLAYLIST</h3>
        <p id="playlist-name">Name of Playlist</p>
        <img id="album-art" alt="Disc of the song">
        <audio id="audio" alt="Audio of the song"></audio>

        <div id="music-info">
            <div id="song-info">
                <div id="song-name">Name of Song</div>
                <div id="artist-name">Name of Artist</div>
            </div>
            <button id="like" class="button"><i class="bi bi-suit-heart"></i></button>
        </div>

        <div id="progress-bar">
            <div id="current-progress"></div>
        </div>

        <div id="controls">
            <button id="shuffle" class="button"><i class="bi bi-shuffle"></i></button>
            <button id="previous" class="button button-navigation"><i class="bi bi-caret-left-fill"></i></button>
            <button id="play-pause" class="button"><i class="bi bi-play-circle-fill"></i></button>
            <button id="next" class="button button-navigation"><i class="bi bi-caret-right-fill"></i></button>
            <button id="repeat" class="button"><i class="bi bi-repeat"></i></button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
